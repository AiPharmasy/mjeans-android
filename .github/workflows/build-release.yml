name: Build & Release APK

# This workflow builds a signed release APK whenever:
#   - A tag like v1.6, v2.0, etc. is pushed → uses the version from the tag name
#   - Manually triggered from the Actions tab → uses provided version or bumps versionCode
# The resulting APK is uploaded to a GitHub Release.

"on":
  push:
    tags:
      - 'v*'           # any tag starting with "v", e.g. v1.6, v2.0
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.6) — overrides versionName in build.gradle'
        required: false
        type: string
        default: ''
      bump_version_code:
        description: 'Auto-increment versionCode by 1 (recommended)'
        required: true
        type: boolean
        default: true

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write    # required to create the release and push tags

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Setup JDK 17 ────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Setup Android SDK ──────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # ── Decode keystore from secret ────────────────────────────────────
      - name: Decode keystore
        env:
          MJEA_NS_KEYSTORE_BASE64: ${{ secrets.MJEA_NS_KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          echo "$MJEA_NS_KEYSTORE_BASE64" | base64 -d > keystore/mjeans-release.keystore
          # Sanity check
          if [ ! -s keystore/mjeans-release.keystore ]; then
            echo "::error::Keystore file is empty — secret MJEA_NS_KEYSTORE_BASE64 is not set or is invalid"
            exit 1
          fi
          echo "Keystore size: $(stat -c%s keystore/mjeans-release.keystore) bytes"

      # ── Compute version name ───────────────────────────────────────────
      # For tag push:  version comes from the tag (e.g. v1.6 → 1.6)
      # For manual run: version comes from inputs.version_name (or fallback to current build.gradle value)
      - name: Compute version name
        id: ver
        env:
          REF: ${{ github.ref }}
          INPUT_VERSION: ${{ github.event.inputs.version_name }}
        run: |
          if [[ "$REF" == refs/tags/v* ]]; then
            # Tag push: extract version from tag (strip leading "v")
            VERSION_NAME="${REF#refs/tags/v}"
            echo "Source: tag push"
          elif [ -n "$INPUT_VERSION" ]; then
            VERSION_NAME="$INPUT_VERSION"
            echo "Source: workflow_dispatch input"
          else
            # Fallback: use current value in build.gradle
            VERSION_NAME=$(grep 'versionName' app/build.gradle | head -1 | sed -E 's/.*versionName "([^"]+)".*/\1/')
            echo "Source: build.gradle (no input provided)"
          fi
          echo "Version name: $VERSION_NAME"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT

      # ── Compute versionCode ────────────────────────────────────────────
      # For tag push: versionCode is derived from the version name (e.g. "1.9" → 109, "2.0" → 200)
      # For manual run with bump_version_code=true: increment the current versionCode by 1
      # For manual run without bump: use the current versionCode
      - name: Compute versionCode
        id: vcode
        env:
          BUMP: ${{ github.event.inputs.bump_version_code }}
          REF: ${{ github.ref }}
          VERSION_NAME: ${{ steps.ver.outputs.version_name }}
        run: |
          if [[ "$REF" == refs/tags/v* ]]; then
            # Tag push: derive versionCode from version name
            # "1.9"   → 109
            # "1.10"  → 110
            # "2.0"   → 200
            # "10.5"  → 1005
            # Strip any non-numeric chars (just in case)
            CLEAN=$(echo "$VERSION_NAME" | sed 's/[^0-9.]//g')
            MAJOR=$(echo "$CLEAN" | cut -d. -f1)
            MINOR=$(echo "$CLEAN" | cut -d. -f2)
            [ -z "$MINOR" ] && MINOR=0
            # versionCode = major * 100 + minor (supports up to minor=99)
            NEW=$((MAJOR * 100 + MINOR))
            echo "Derived versionCode from $VERSION_NAME: $NEW"
            sed -i "s/versionCode [0-9]*/versionCode $NEW/" app/build.gradle
            echo "version_code=$NEW" >> $GITHUB_OUTPUT
          elif [ "$BUMP" = "true" ]; then
            CURRENT=$(grep 'versionCode' app/build.gradle | head -1 | grep -oE '[0-9]+')
            NEW=$((CURRENT + 1))
            echo "Bumping versionCode: $CURRENT → $NEW"
            sed -i "s/versionCode [0-9]*/versionCode $NEW/" app/build.gradle
            echo "version_code=$NEW" >> $GITHUB_OUTPUT
          else
            CURRENT=$(grep 'versionCode' app/build.gradle | head -1 | grep -oE '[0-9]+')
            echo "Not bumping versionCode (manual run, bump_version_code=false): $CURRENT"
            echo "version_code=$CURRENT" >> $GITHUB_OUTPUT
          fi

      - name: Override versionName
        env:
          NEW_NAME: ${{ steps.ver.outputs.version_name }}
        run: |
          echo "Setting versionName to: $NEW_NAME"
          sed -i "s|versionName \".*\"|versionName \"$NEW_NAME\"|" app/build.gradle

      - name: Read final version info
        id: version
        run: |
          VC=$(grep 'versionCode' app/build.gradle | head -1 | grep -oE '[0-9]+')
          VN=$(grep 'versionName' app/build.gradle | head -1 | sed -E 's/.*versionName "([^"]+)".*/\1/')
          echo "version_code=$VC" >> $GITHUB_OUTPUT
          echo "version_name=$VN" >> $GITHUB_OUTPUT
          echo "Final version: $VN (versionCode $VC)"
          # Sanity: versionCode must be at least 1
          if [ "$VC" -lt 1 ]; then
            echo "::error::Invalid versionCode: $VC"
            exit 1
          fi

      # ── Build the signed release APK ───────────────────────────────────
      - name: Build release APK
        env:
          MJEA_NS_STORE_PASSWORD: ${{ secrets.MJEA_NS_STORE_PASSWORD }}
          MJEA_NS_KEY_ALIAS: ${{ secrets.MJEA_NS_KEY_ALIAS }}
          MJEA_NS_KEY_PASSWORD: ${{ secrets.MJEA_NS_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --no-configuration-cache

      # ── Verify the APK signature ──────────────────────────────────────
      - name: Verify APK signature
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          # Sanity: signature schemes
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --verbose "$APK" | head -8
          # Print certificate fingerprint (must match B7:94:02:...)
          echo ""
          echo "Certificate fingerprints:"
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs "$APK" | grep -E "SHA-256|SHA-1" | head -2
          # Save fingerprint to file for verification in next step
          $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs "$APK" \
            | grep "SHA-256" | head -1 > /tmp/sha256.txt
          cat /tmp/sha256.txt

      - name: Verify keystore continuity
        run: |
          EXPECTED="b794027e645664c17e2f1ed164f7d092987832f1aafdc8a893ed6f7c11ba5ccd"
          ACTUAL=$(grep -oE '[a-f0-9]{64}' /tmp/sha256.txt | head -1)
          echo "Expected SHA-256: $EXPECTED"
          echo "Actual   SHA-256: $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Keystore fingerprint mismatch! The keystore in secrets is different from the original. Users will not be able to update."
            exit 1
          fi
          echo "✅ Keystore continuity verified"

      # ── Rename APK to a friendly name ──────────────────────────────────
      - name: Rename APK
        id: apk
        run: |
          VERSION_NAME="${{ steps.version.outputs.version_name }}"
          VERSION_CODE="${{ steps.version.outputs.version_code }}"
          APK_NAME="mjeans-${VERSION_NAME}-release.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "APK renamed to: $APK_NAME"
          ls -la "$APK_NAME"

      # ── Also generate assetlinks.json with the current fingerprint ─────
      - name: Generate assetlinks.json
        run: |
          # Extract the actual SHA-256 from the built APK (lowercase, no colons)
          RAW_SHA=$($ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs \
                  app/build/outputs/apk/release/app-release.apk \
                  | grep "SHA-256" | head -1 | grep -oE '[a-fA-F0-9]{64}' | head -1)
          echo "Raw SHA-256 (lowercase, no colons): $RAW_SHA"

          # Format as uppercase with colons (standard Android format)
          # e.g. b794027e... → B7:94:02:7E:...
          SHA=$(echo "$RAW_SHA" | tr 'a-f' 'A-F' | sed 's/\(..\)/\1:/g;s/:$//')
          echo "Formatted SHA-256: $SHA"

          if [ -z "$SHA" ]; then
            echo "::error::Failed to extract SHA-256 from APK"
            exit 1
          fi

          # Write assetlinks.json with NO leading indentation (heredoc with <<'JSON')
          cat > assetlinks.json <<JSON
          [
            {
              "relation": ["delegate_permission/common.handle_all_urls"],
              "target": {
                "namespace": "android_app",
                "package_name": "ir.chabooksaz.mjeans",
                "sha256_cert_fingerprints": [
                  "$SHA"
                ]
              }
            }
          ]
          JSON

          # Strip leading whitespace from each line (the heredoc above preserves indentation)
          # to ensure clean JSON output
          sed -i 's/^[[:space:]]*//' assetlinks.json
          echo "=== assetlinks.json ==="
          cat assetlinks.json
          echo ""
          echo "=== Validating JSON ==="
          python3 -m json.tool assetlinks.json > /dev/null && echo "✅ Valid JSON" || (echo "::error::Invalid JSON"; exit 1)

      # ── Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: mjeans v${{ steps.version.outputs.version_name }}
          body: |
            # mjeans v${{ steps.version.outputs.version_name }}

            **Package:** `ir.chabooksaz.mjeans`
            **Version Code:** ${{ steps.version.outputs.version_code }}
            **Min SDK:** 23 (Android 6.0)
            **Target SDK:** 34 (Android 14)

            ## 🔑 Signature info

            - **SHA-256:** `B7:94:02:7E:64:56:64:C1:7E:2F:1E:D1:64:F7:D0:92:98:78:32:F1:AA:FD:C8:A8:93:ED:6F:7C:11:BA:5C:CD`
            - **Keystore:** `mjeans-release.keystore`
            - **Alias:** `mjeans`
            - **Signature Schemes:** V1 (JAR) + V2 (APK Signature Scheme v2) ✓ verified

            ## ✅ Continuity

            Same keystore since v1.2 — users can update from any version ≥ 1.2 without uninstalling.

            ## 📦 Install

            1. Download `mjeans-${{ steps.version.outputs.version_name }}-release.apk` from the Assets below
            2. Copy to your phone
            3. Tap to install (enable "Install from unknown sources" if prompted)
            4. If updating from v1.0/v1.1 (different keystore), uninstall first

            ## 🔗 App Links

            Deploy `assetlinks.json` (also attached as an asset) to:
            ```
            https://mjeans.ir/.well-known/assetlinks.json
            ```

            ## 📝 Changelog

            Built automatically by GitHub Actions from commit `${{ github.sha }}`.
          files: |
            ${{ steps.apk.outputs.apk_name }}
            assetlinks.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
